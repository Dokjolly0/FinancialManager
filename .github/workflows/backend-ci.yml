name: backend-ci

on:
  push:
    branches: [main]
    paths:
      - "financial-manager-backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "financial-manager-backend/**"
      - ".github/workflows/backend-ci.yml"

defaults:
  run:
    working-directory: financial-manager-backend

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: financial-manager-backend/go.mod

      - name: gofmt check
        run: |
          fmt_out="$(gofmt -l .)"
          if [ -n "$fmt_out" ]; then
            echo "The following files are not gofmt-formatted:"
            echo "$fmt_out"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go test (race)
        run: go test -race ./...

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: Validate OpenAPI contract
        run: npx --yes @redocly/cli@latest lint openapi/openapi.yaml

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build --build-arg TARGET=api -t financial-manager-api:ci .
        working-directory: financial-manager-backend

      - name: Build worker image
        run: docker build --build-arg TARGET=worker -t financial-manager-worker:ci .
        working-directory: financial-manager-backend

      # plan.md section 19.8: "Scansione vulnerabilità... immagini Docker".
      # Fails the build on HIGH/CRITICAL findings; a base-image CVE isn't
      # something app code can wait out until the next unrelated release.
      - name: Scan API image (Trivy)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: financial-manager-api:ci
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

      - name: Scan worker image (Trivy)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: financial-manager-worker:ci
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true
