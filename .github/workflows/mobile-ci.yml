name: mobile-ci

on:
  push:
    branches: [main]
    paths:
      - "financial-manager-app/**"
      - ".github/workflows/mobile-ci.yml"
  pull_request:
    paths:
      - "financial-manager-app/**"
      - ".github/workflows/mobile-ci.yml"

defaults:
  run:
    working-directory: financial-manager-app

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter pub get

      - name: Format check
        run: dart format --output=none --set-exit-if-changed lib test

      - name: Analyze
        run: flutter analyze

      - name: Unit and widget tests
        run: flutter test

  build-android:
    runs-on: ubuntu-latest
    needs: analyze-and-test
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter pub get

      - name: Build debug APK
        run: flutter build apk --debug

  build-ios:
    runs-on: macos-latest
    needs: analyze-and-test
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter pub get

      - name: Build unsigned iOS debug app
        run: flutter build ios --no-codesign --debug
