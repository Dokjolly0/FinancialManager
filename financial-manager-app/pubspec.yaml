name: financialmanager
description: "FinancialManager — gestione economica personale."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management and dependency injection (plan.md section 9.2).
  flutter_riverpod: ^2.6.1

  # Declarative routing with redirect-based auth guards (section 9.8).
  go_router: ^14.8.1

  # HTTP client: base URL per environment, interceptors, timeouts (section 9.5).
  dio: ^5.7.0

  # Secure storage for refresh tokens (Keychain/Keystore wrapper, section 9.2).
  flutter_secure_storage: ^9.2.4

  # Locale-aware date/number formatting (section 9.7, 17.3).
  intl: ^0.20.2

  # Client-generated correlation/idempotency keys (section 7.6, 9.5).
  uuid: ^4.5.1
  google_sign_in: ^7.2.0
  image_picker: ^1.2.2
  image_cropper: ^12.2.1

  # Report charts: andamento line, confronto mensile bars (section 7.12, 18).
  fl_chart: ^0.69.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  generate: true
