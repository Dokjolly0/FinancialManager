# Production overrides. Only the API is published on the host; PostgreSQL,
# Redis, and MinIO remain reachable only on backend_internal.

services:
  api:
    ports:
      - "${API_HOST_BIND:-0.0.0.0}:${API_HOST_PORT:-10003}:8080"
    environment:
      APP_ENV: production
    restart: unless-stopped

  worker:
    environment:
      APP_ENV: production
    restart: unless-stopped

  postgres:
    restart: unless-stopped

  redis:
    restart: unless-stopped

  object-storage:
    restart: unless-stopped
