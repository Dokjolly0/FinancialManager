# Base service definitions shared by every environment. Environment-specific
# overrides (host ports, restart policy, build vs. pinned image) live in
# compose.dev.yaml and compose.prod.yaml (plan.md section 21.2).
#
# Usage:
#   docker compose -f compose.yaml -f compose.dev.yaml up
#   docker compose -f compose.yaml -f compose.prod.yaml up

name: financial-manager

networks:
  backend_internal:
  edge:

volumes:
  postgres_data:
  object_storage_data:

x-backend-env: &backend-env
  APP_ENV: ${APP_ENV:-local}
  DATABASE_URL: postgres://${POSTGRES_USER:-financial_manager}:${POSTGRES_PASSWORD:-financial_manager}@postgres:5432/${POSTGRES_DB:-financial_manager}?sslmode=disable
  REDIS_ADDR: redis:6379
  REDIS_PASSWORD: ${REDIS_PASSWORD:-financial_manager}
  OBJECT_STORAGE_ENDPOINT: object-storage:9000
  OBJECT_STORAGE_BUCKET: ${OBJECT_STORAGE_BUCKET:-financial-manager-media}
  OBJECT_STORAGE_ACCESS_KEY: ${OBJECT_STORAGE_ACCESS_KEY:-financial_manager}
  OBJECT_STORAGE_SECRET_KEY: ${OBJECT_STORAGE_SECRET_KEY:-financial_manager_secret}
  GOOGLE_CLIENT_IDS: ${GOOGLE_CLIENT_IDS:-}
  JWT_SIGNING_KEY: ${JWT_SIGNING_KEY:-}
  IMAGE_SEARCH_PROVIDER: ${IMAGE_SEARCH_PROVIDER:-stub}
  IMAGE_SEARCH_API_KEY: ${IMAGE_SEARCH_API_KEY:-}

services:
  postgres:
    image: postgres:16-alpine
    networks: [backend_internal]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-financial_manager}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-financial_manager}
      POSTGRES_DB: ${POSTGRES_DB:-financial_manager}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-financial_manager} -d ${POSTGRES_DB:-financial_manager}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    networks: [backend_internal]
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-financial_manager}"]
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD:-financial_manager} ping | grep -q PONG"]
      interval: 5s
      timeout: 5s
      retries: 10

  object-storage:
    image: minio/minio:latest
    networks: [backend_internal]
    command: server /data
    environment:
      MINIO_ROOT_USER: ${OBJECT_STORAGE_ACCESS_KEY:-financial_manager}
      MINIO_ROOT_PASSWORD: ${OBJECT_STORAGE_SECRET_KEY:-financial_manager_secret}
    volumes:
      - object_storage_data:/data

  migrate:
    build:
      context: .
      args:
        TARGET: migrate
    networks: [backend_internal]
    environment: *backend-env
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: .
      args:
        TARGET: api
    networks: [backend_internal, edge]
    environment: *backend-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  worker:
    build:
      context: .
      args:
        TARGET: worker
    networks: [backend_internal]
    environment: *backend-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
